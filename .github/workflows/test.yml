name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint (critical errors)
      run: |
        flake8 langchain_iointelligence/ --select=E9,F63,F7,F82 --show-source

    - name: Lint (style)
      run: |
        flake8 langchain_iointelligence/ tests/

    - name: Run tests
      env:
        IO_API_KEY: test_api_key_for_github_actions
        IO_API_URL: https://test.example.com/v1/chat/completions
      run: |
        pytest -v

  standard-compliance:
    # LangChain standard test suite, isolated from the main matrix so its
    # langchain-tests/langchain-core closure doesn't affect the supported-range
    # jobs above. Runs on a single modern Python.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test-standard]"

    - name: Run standard compliance tests
      env:
        IO_API_KEY: test_api_key_for_github_actions
        IO_API_URL: https://test.example.com/v1/chat/completions
      run: |
        pytest tests/test_standard.py -v
